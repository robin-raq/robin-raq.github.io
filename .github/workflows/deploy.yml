name: Deploy to GitHub Pages

# Live URL: https://robin-raq.github.io/ (user site — requires repo name robin-raq.github.io)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # User site at domain root — must NOT use /portfolio-website/ prefix or CSS/JS 404 (unstyled page).
      - name: Build static site
        env:
          BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://robin-raq.github.io
        run: |
          rm -rf .next
          npm run build

      - name: Ensure .nojekyll (Jekyll must not skip _next)
        run: touch out/.nojekyll && ls -la out/.nojekyll

      - name: Verify asset paths are root-based
        run: |
          set -e
          if grep -rq "portfolio-website/_next" out --include="*.html" --include="*.txt" 2>/dev/null; then
            echo "::error::Build still references /portfolio-website/ — unset BASE_PATH for user site robin-raq.github.io"
            exit 1
          fi
          echo "Sample CSS link:" && grep -o 'href="/_next[^"]*\.css"' out/index.html | head -1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
